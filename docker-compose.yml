# =========================================================
# Tech Challenge Fase 4 - Ambiente local
# =========================================================
# Sobe DynamoDB Local + LocalStack (SNS) + a aplicação Lambda
# emulada como container, para você testar antes de fazer
# deploy na AWS de verdade.
#
# Comandos úteis:
#   docker compose up -d            # sobe todo o ambiente
#   docker compose logs -f lambda   # acompanha logs da função
#   docker compose down -v          # derruba e limpa volumes
# =========================================================

services:

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: tc4-dynamodb-local
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal

  localstack:
    image: localstack/localstack:3.4
    container_name: tc4-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sns,sqs
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  init-aws:
    image: amazon/aws-cli:2.15.0
    container_name: tc4-init-aws
    depends_on:
      - dynamodb-local
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
      sleep 10 &&
      echo 'Criando tabela DynamoDB local...' &&
      aws dynamodb create-table
        --table-name Feedbacks
        --attribute-definitions AttributeName=id,AttributeType=S
        --key-schema AttributeName=id,KeyType=HASH
        --billing-mode PAY_PER_REQUEST
        --endpoint-url http://dynamodb-local:8000 || true &&
      echo 'Criando tópico SNS local...' &&
      aws sns create-topic
        --name feedback-notifications
        --endpoint-url http://localstack:4566 || true &&
      echo 'Inicialização local concluída.'
      "

  lambda:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tc4-lambda
    depends_on:
      - init-aws
    ports:
      - "9000:8080"
    environment:
      - SPRING_CLOUD_FUNCTION_DEFINITION=processarFeedback
      - DYNAMODB_TABLE_NAME=Feedbacks
      - SNS_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:feedback-notifications
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - SNS_ENDPOINT=http://localstack:4566

volumes:
  dynamodb-data:
  localstack-data:
